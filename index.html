<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>One Way Ticket</title>
  <style>
    :root {
      --blue: #2f88d5;
      --bezel: #cfd1d9;
      --card: #ececef;
      --ink: #000;
      --qr-purple: #b06ab4;
      --qr-blue: #2f8ad6;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bezel);
      color: var(--ink);
    }

    .phone {
      position: relative;
      width: min(768px, 100vw);
      height: 100dvh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bezel);
    }

    .header {
      position: absolute;
      inset: 0 0 auto 0;
      height: clamp(320px, 40dvh, 420px);
      background: var(--blue);
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      z-index: 0;
    }

    .status {
      width: min(650px, 90vw);
      margin: calc(env(safe-area-inset-top) + 18px) auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      font-weight: 600;
      font-size: clamp(28px, 4.7vw, 44px);
      line-height: 1;
    }

    .island {
      width: min(350px, 46vw);
      height: clamp(56px, 7.2vh, 72px);
      border-radius: 999px;
      background: #000;
      display: grid;
      place-items: center;
      margin: 0 14px;
      flex: 0 0 auto;
    }

    .arrow {
      width: 22px;
      height: 22px;
      border-top: 8px solid #0b84ff;
      border-left: 8px solid #0b84ff;
      transform: rotate(45deg);
      margin-top: 4px;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 24px;
    }

    .signal span {
      width: 6px;
      border-radius: 2px;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 10px; opacity: 1; }
    .signal span:nth-child(2) { height: 14px; opacity: 0.9; }
    .signal span:nth-child(3) { height: 18px; opacity: 0.75; }
    .signal span:nth-child(4) { height: 22px; opacity: 0.5; }

    .wifi {
      width: 30px;
      height: 20px;
      border-top: 5px solid #fff;
      border-radius: 999px 999px 0 0;
      position: relative;
      transform: rotate(180deg) translateY(-2px);
    }

    .wifi::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: -7px;
      border-top: 5px solid #fff;
      border-radius: 999px 999px 0 0;
      opacity: 0.85;
    }

    .battery {
      background: #f4d511;
      color: #000;
      border-radius: 10px;
      font-weight: 700;
      padding: 2px 8px;
      line-height: 1;
      font-size: clamp(24px, 4vw, 38px);
    }

    .title {
      text-align: center;
      color: #fff;
      margin: clamp(22px, 3.8vh, 42px) 0 0;
      font-weight: 600;
      font-size: clamp(36px, 6.6vw, 62px);
      line-height: 1.05;
    }

    .ticket-card {
      position: absolute;
      left: clamp(24px, 6vw, 48px);
      right: clamp(24px, 6vw, 48px);
      top: clamp(210px, 29.5dvh, 300px);
      bottom: clamp(20px, 2.8dvh, 28px);
      border-radius: 42px;
      background: var(--card);
      padding: clamp(26px, 4.1dvh, 40px) clamp(18px, 4vw, 30px) clamp(18px, 2.8dvh, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 1;
    }

    .qr-shell {
      width: min(56vw, 426px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: var(--qr-purple);
      display: grid;
      place-items: center;
      transition: background-color 0.18s linear;
    }

    #qrCanvas {
      width: 88%;
      height: 88%;
      display: block;
      background: #fff;
      image-rendering: pixelated;
      border: 1px solid #00000020;
    }

    .tap {
      margin: clamp(10px, 1.6dvh, 16px) 0 clamp(10px, 1.6dvh, 14px);
      font-size: clamp(22px, 4.5vw, 38px);
      font-weight: 600;
      line-height: 1.05;
    }

    .dash {
      width: 84%;
      border-bottom: 5px dashed #b7bcc5;
      margin-bottom: clamp(22px, 3.2dvh, 34px);
    }

    .type {
      margin: 0;
      font-size: clamp(58px, 9.5vw, 86px);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
    }

    .type.interstate {
      color: #ff3347;
    }

    .zone {
      margin: clamp(8px, 1.2dvh, 12px) 0 0;
      font-size: clamp(96px, 16.5vw, 146px);
      line-height: 0.92;
      font-weight: 900;
    }

    .zone-ride {
      margin: clamp(8px, 1.5dvh, 16px) 0 0;
      font-size: clamp(56px, 8.8vw, 82px);
      font-weight: 900;
      line-height: 1;
    }

    .riders {
      margin: clamp(8px, 1.2dvh, 14px) 0 0;
      font-size: clamp(20px, 4.4vw, 40px);
      line-height: 1.05;
    }

    .stretch {
      flex: 1;
      min-height: clamp(26px, 8.5dvh, 140px);
    }

    .stripe {
      width: 88%;
      height: clamp(14px, 1.8dvh, 20px);
      background: linear-gradient(90deg, #c4eadf 0 33.333%, #7d0a45 33.333% 66.666%, #ece90d 66.666% 100%);
      margin-bottom: clamp(20px, 3.2dvh, 34px);
      animation: stripeBlink 2.6s ease-in-out infinite;
    }

    @keyframes stripeBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.28; }
    }

    .progress {
      width: 84%;
      height: clamp(10px, 1.2dvh, 14px);
      background: #dddde0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: clamp(18px, 2.8dvh, 28px);
    }

    .progress > div {
      width: 100%;
      height: 100%;
      background: #1e84eb;
      border-radius: inherit;
      transform-origin: left center;
      transform: scaleX(0);
    }

    .timer {
      margin: 0;
      font-size: clamp(22px, 4.9vw, 44px);
      line-height: 1.04;
    }

    .timer strong {
      font-size: clamp(64px, 10.8vw, 98px);
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .hint {
      margin: clamp(8px, 1.4dvh, 14px) 0 0;
      font-size: clamp(20px, 4.4vw, 38px);
      text-decoration: underline;
      text-underline-offset: 3px;
      color: #1a1a1a;
      line-height: 1.08;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 6px);
      width: min(280px, 36vw);
      height: 10px;
      border-radius: 999px;
      background: #bfc0c6;
      opacity: 0.75;
      z-index: 2;
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="header">
      <div class="status" aria-hidden="true">
        <div>6:19</div>
        <div class="island"><div class="arrow"></div></div>
        <div class="status-right">
          <div class="signal"><span></span><span></span><span></span><span></span></div>
          <div class="wifi"></div>
          <div class="battery">48</div>
        </div>
      </div>
      <h1 class="title">One Way Ticket</h1>
    </header>

    <section class="ticket-card" aria-label="Ticket">
      <div class="qr-shell" id="qrShell">
        <canvas id="qrCanvas" width="420" height="420" aria-label="QR code"></canvas>
      </div>

      <p class="tap">Tap to enlarge</p>
      <div class="dash"></div>

      <h2 id="typeText" class="type interstate">INTERSTATE</h2>
      <p id="zoneText" class="zone">2</p>
      <p class="zone-ride">ZONE RIDE</p>
      <p id="ridersText" class="riders">1 Adult</p>
      <div class="stretch"></div>

      <div class="stripe"></div>
      <div class="progress"><div id="progressBar"></div></div>
      <p class="timer">Expires in <strong id="timerText">56:08</strong></p>
      <p class="hint">View Onboard Validator Instructions</p>
    </section>

    <div class="home-indicator" aria-hidden="true"></div>
  </main>

  <script>
    const qrCanvas = document.getElementById("qrCanvas");
    const qrShell = document.getElementById("qrShell");
    const ctx = qrCanvas.getContext("2d");
    const typeText = document.getElementById("typeText");
    const zoneText = document.getElementById("zoneText");
    const ridersText = document.getElementById("ridersText");
    const timerText = document.getElementById("timerText");
    const progressBar = document.getElementById("progressBar");

    const borderColors = ["var(--qr-purple)", "var(--qr-blue)"];
    let borderIndex = -1;
    let tripType = "interstate";
    let zone = 2;
    let adults = 1;
    let totalSeconds = 60 * 60;
    let remainingSeconds = 56 * 60 + 8;
    let timerId = null;
    let qrIssueCounter = 0;
    let firstIssue = true;

    function randomUint32() {
      if (window.crypto && window.crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0];
      }
      return Math.floor(Math.random() * 4294967295);
    }

    function nextSeed() {
      qrIssueCounter += 1;
      return (Date.now() ^ randomUint32() ^ qrIssueCounter) >>> 0;
    }

    function rand(state) {
      const next = (state * 1664525 + 1013904223) >>> 0;
      return [next, next / 4294967296];
    }

    function drawFinder(x, y, matrix, unit, offset) {
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + x * unit, offset + y * unit, 7 * unit, 7 * unit);
      ctx.fillStyle = "#fff";
      ctx.fillRect(offset + (x + 1) * unit, offset + (y + 1) * unit, 5 * unit, 5 * unit);
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + (x + 2) * unit, offset + (y + 2) * unit, 3 * unit, 3 * unit);
      for (let r = 0; r < 7; r += 1) {
        for (let c = 0; c < 7; c += 1) {
          matrix[y + r][x + c] = 2;
        }
      }
    }

    function drawQr(seed) {
      const size = 57;
      const unit = Math.floor(qrCanvas.width / size);
      const offset = Math.floor((qrCanvas.width - size * unit) / 2);
      const matrix = Array.from({ length: size }, () => Array(size).fill(0));

      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, qrCanvas.width, qrCanvas.height);

      drawFinder(2, 2, matrix, unit, offset);
      drawFinder(size - 9, 2, matrix, unit, offset);
      drawFinder(2, size - 9, matrix, unit, offset);

      let state = seed;
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (matrix[r][c] === 2) {
            continue;
          }
          const output = rand(state);
          state = output[0];
          if (output[1] > 0.5) {
            ctx.fillStyle = "#000";
            ctx.fillRect(offset + c * unit, offset + r * unit, unit, unit);
          }
        }
      }
    }

    function formatTimer(seconds) {
      const mins = Math.floor(seconds / 60).toString();
      const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function renderText() {
      typeText.textContent = tripType.toUpperCase();
      typeText.classList.toggle("interstate", tripType === "interstate");
      zoneText.textContent = zone.toString();
      ridersText.textContent = `${adults} ${adults === 1 ? "Adult" : "Adults"}`;
    }

    function tick() {
      if (remainingSeconds <= 0) {
        clearInterval(timerId);
        timerId = null;
        timerText.textContent = "0:00";
        progressBar.style.transform = "scaleX(1)";
        return;
      }
      remainingSeconds -= 1;
      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = `scaleX(${(totalSeconds - remainingSeconds) / totalSeconds})`;
    }

    function issueTicket() {
      borderIndex = (borderIndex + 1) % borderColors.length;
      qrShell.style.background = borderColors[borderIndex];
      drawQr(nextSeed());
      renderText();

      totalSeconds = tripType === "interstate" ? 60 * 60 : 30 * 60;
      remainingSeconds = totalSeconds;

      if (firstIssue && tripType === "interstate") {
        remainingSeconds = 56 * 60 + 8;
        firstIssue = false;
      }

      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = `scaleX(${(totalSeconds - remainingSeconds) / totalSeconds})`;

      if (timerId) {
        clearInterval(timerId);
      }
      timerId = setInterval(tick, 1000);
    }

    zoneText.addEventListener("click", () => {
      zone = zone === 20 ? 1 : zone + 1;
      issueTicket();
    });

    ridersText.addEventListener("click", () => {
      adults = adults === 10 ? 1 : adults + 1;
      issueTicket();
    });

    typeText.addEventListener("click", () => {
      tripType = tripType === "intrastate" ? "interstate" : "intrastate";
      issueTicket();
    });

    qrShell.addEventListener("click", issueTicket);
    issueTicket();
  </script>
</body>
</html>
