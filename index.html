<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Way Ticket</title>
  <style>
    :root {
      --blue: #2f8ad6;
      --screen-gray: #d0d2da;
      --card-gray: #e9e9eb;
      --ink: #000;
      --qr-purple: #b06ab4;
      --qr-blue: #2f8ad6;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--screen-gray);
      color: var(--ink);
      overflow: hidden;
    }

    .phone {
      width: min(768px, 100vw);
      height: 100dvh;
      margin: 0 auto;
      padding: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      background: var(--blue);
      border-radius: 0 0 18px 18px;
      padding: max(12px, env(safe-area-inset-top)) 0 clamp(64px, 11vh, 110px);
    }

    /* Safety guard: hide any previously used fake status-bar elements. */
    .status,
    .dynamic-island,
    .status-right,
    .signal,
    .wifi,
    .battery,
    .nav-arrow {
      display: none !important;
    }

    .title {
      text-align: center;
      color: #fff;
      margin: clamp(14px, 2.6vh, 26px) 0 0;
      font-weight: 600;
      font-size: clamp(28px, 5.2vw, 50px);
    }

    .ticket-card {
      width: min(94vw, 700px);
      margin: clamp(-58px, -9vh, -90px) auto 0;
      border-radius: 30px;
      background: var(--card-gray);
      padding: clamp(20px, 3.4vh, 40px) clamp(18px, 4vw, 32px) clamp(18px, 3vh, 26px);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .qr-shell {
      width: min(430px, 74vw);
      aspect-ratio: 1 / 1;
      background: var(--qr-purple);
      border-radius: 18px;
      display: grid;
      place-items: center;
      transition: background-color 0.18s linear;
    }

    #qrCanvas {
      width: 88%;
      height: 88%;
      display: block;
      image-rendering: pixelated;
      background: #fff;
      border: 1px solid #00000020;
    }

    .tap {
      margin: 14px 0 18px;
      font-size: clamp(18px, 3.7vw, 42px);
      font-weight: 600;
    }

    .dash {
      width: 84%;
      border-bottom: 5px dashed #bbbfc7;
      margin-bottom: 48px;
    }

    .type {
      margin: 0;
      font-size: clamp(46px, 8vw, 80px);
      font-weight: 900;
      letter-spacing: 1.2px;
      line-height: 1.03;
    }

    .type.interstate {
      color: #e2184a;
    }

    .zone {
      margin: 8px 0 0;
      font-size: clamp(84px, 13vw, 130px);
      line-height: 0.95;
      font-weight: 900;
    }

    .zone-ride {
      margin: 16px 0 0;
      font-size: clamp(36px, 5.6vw, 58px);
      font-weight: 900;
      line-height: 1;
    }

    .riders {
      margin: 8px 0 0;
      font-size: clamp(24px, 4.2vw, 42px);
      line-height: 1.05;
    }

    .stretch {
      flex: 1;
      min-height: 40px;
    }

    .stripe {
      width: 90%;
      height: 20px;
      background: linear-gradient(90deg, #c5ebe0 0 33.333%, #a36e83 33.333% 66.666%, #e6e462 66.666% 100%);
      margin-bottom: 48px;
    }

    .progress {
      width: 84%;
      height: 14px;
      background: #dddde0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 36px;
    }

    .progress > div {
      width: 100%;
      height: 100%;
      background: #1e81ec;
      border-radius: inherit;
      transform-origin: left center;
    }

    .timer {
      margin: 0;
      font-size: clamp(28px, 5.4vw, 52px);
      line-height: 1;
    }

    .timer strong {
      font-size: clamp(62px, 9.6vw, 96px);
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .hint {
      margin: 16px 0 0;
      font-size: clamp(20px, 4.1vw, 40px);
      text-decoration: underline;
      text-underline-offset: 3px;
      color: #1a1a1a;
      line-height: 1.08;
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="header">
      <h1 class="title">One Way Ticket</h1>
    </header>

    <section class="ticket-card" aria-label="Ticket">
      <div class="qr-shell" id="qrShell">
        <canvas id="qrCanvas" width="380" height="380" aria-label="QR code"></canvas>
      </div>

      <p class="tap">Tap to enlarge</p>
      <div class="dash"></div>

      <h2 id="typeText" class="type">INTRASTATE</h2>
      <p id="zoneText" class="zone">2</p>
      <p class="zone-ride">ZONE RIDE</p>
      <p id="ridersText" class="riders">2 Adults</p>
      <div class="stretch"></div>

      <div class="stripe"></div>
      <div class="progress"><div id="progressBar"></div></div>
      <p class="timer">Expires in <strong id="timerText">30:00</strong></p>
      <p class="hint">View Onboard Validator Instructions</p>
    </section>
  </main>

  <script>
    const qrCanvas = document.getElementById("qrCanvas");
    const qrShell = document.getElementById("qrShell");
    const ctx = qrCanvas.getContext("2d");
    const typeText = document.getElementById("typeText");
    const zoneText = document.getElementById("zoneText");
    const ridersText = document.getElementById("ridersText");
    const timerText = document.getElementById("timerText");
    const progressBar = document.getElementById("progressBar");

    const borderColors = ["var(--qr-purple)", "var(--qr-blue)"];
    let borderIndex = -1;
    let tripType = "intrastate";
    let zone = 2;
    let adults = 2;
    let totalSeconds = 30 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let qrIssueCounter = 0;

    function randomUint32() {
      if (window.crypto && window.crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0];
      }
      return Math.floor(Math.random() * 4294967295);
    }

    function nextSeed() {
      qrIssueCounter += 1;
      return (Date.now() ^ randomUint32() ^ qrIssueCounter) >>> 0;
    }

    function rand(state) {
      const next = (state * 1664525 + 1013904223) >>> 0;
      return [next, next / 4294967296];
    }

    function drawFinder(x, y, matrix, unit, offset) {
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + x * unit, offset + y * unit, 7 * unit, 7 * unit);
      ctx.fillStyle = "#fff";
      ctx.fillRect(offset + (x + 1) * unit, offset + (y + 1) * unit, 5 * unit, 5 * unit);
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + (x + 2) * unit, offset + (y + 2) * unit, 3 * unit, 3 * unit);
      for (let r = 0; r < 7; r += 1) {
        for (let c = 0; c < 7; c += 1) {
          matrix[y + r][x + c] = 2;
        }
      }
    }

    function drawQr(seed) {
      const size = 57;
      const unit = Math.floor(qrCanvas.width / size);
      const offset = Math.floor((qrCanvas.width - size * unit) / 2);
      const matrix = Array.from({ length: size }, () => Array(size).fill(0));

      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, qrCanvas.width, qrCanvas.height);

      drawFinder(2, 2, matrix, unit, offset);
      drawFinder(size - 9, 2, matrix, unit, offset);
      drawFinder(2, size - 9, matrix, unit, offset);

      let state = seed;
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (matrix[r][c] === 2) {
            continue;
          }
          const output = rand(state);
          state = output[0];
          if (output[1] > 0.5) {
            ctx.fillStyle = "#000";
            ctx.fillRect(offset + c * unit, offset + r * unit, unit, unit);
          }
        }
      }
    }

    function formatTimer(seconds) {
      const mins = Math.floor(seconds / 60).toString();
      const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function renderText() {
      typeText.textContent = tripType.toUpperCase();
      typeText.classList.toggle("interstate", tripType === "interstate");
      zoneText.textContent = zone.toString();
      ridersText.textContent = `${adults} ${adults === 1 ? "Adult" : "Adults"}`;
    }

    function tick() {
      if (remainingSeconds <= 0) {
        clearInterval(timerId);
        timerId = null;
        timerText.textContent = "0:00";
        progressBar.style.transform = "scaleX(0)";
        return;
      }
      remainingSeconds -= 1;
      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = `scaleX(${remainingSeconds / totalSeconds})`;
    }

    function issueTicket() {
      borderIndex = (borderIndex + 1) % borderColors.length;
      qrShell.style.background = borderColors[borderIndex];
      drawQr(nextSeed());
      renderText();

      totalSeconds = tripType === "interstate" ? 60 * 60 : 30 * 60;
      remainingSeconds = totalSeconds;
      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = "scaleX(1)";

      if (timerId) {
        clearInterval(timerId);
      }
      timerId = setInterval(tick, 1000);
    }

    // Hidden interactions retained for demo controls while keeping screenshot-identical UI.
    zoneText.addEventListener("click", () => {
      zone = zone === 20 ? 1 : zone + 1;
      issueTicket();
    });

    ridersText.addEventListener("click", () => {
      adults = adults === 10 ? 1 : adults + 1;
      issueTicket();
    });

    typeText.addEventListener("click", () => {
      tripType = tripType === "intrastate" ? "interstate" : "intrastate";
      issueTicket();
    });

    qrShell.addEventListener("click", issueTicket);
    issueTicket();
  </script>
</body>
</html>
