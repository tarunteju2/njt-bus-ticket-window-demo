<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>One Way Ticket</title>
  <style>
    :root {
      --blue: #2f88d5;
      --bezel: #cfd2db;
      --ink: #000;
      --qr-purple: #b06ab4;
      --qr-blue: #2f8ad6;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bezel);
      color: var(--ink);
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100dvh;
      max-width: 100vw;
      margin: 0 auto;
      overflow: hidden;
    }

    .header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: clamp(230px, 34dvh, 350px);
      background: var(--blue);
      border-bottom-left-radius: 44px;
      border-bottom-right-radius: 44px;
      z-index: 0;
    }

    .title {
      margin: calc(env(safe-area-inset-top) + clamp(24px, 5dvh, 50px)) 0 0;
      text-align: center;
      color: #fff;
      font-weight: 600;
      font-size: clamp(28px, 6.3vw, 56px);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .ticket-card {
      position: absolute;
      left: clamp(26px, 6.5vw, 52px);
      right: clamp(26px, 6.5vw, 52px);
      top: clamp(145px, 22dvh, 230px);
      bottom: 0;
      border-top-left-radius: 42px;
      border-top-right-radius: 42px;
      background: #fff;
      padding: clamp(28px, 4.5dvh, 44px) clamp(18px, 4.5vw, 34px) clamp(18px, 3dvh, 28px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 1;
    }

    .qr-shell {
      width: min(56vw, 420px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--qr-purple);
      border-radius: 16px;
      display: grid;
      place-items: center;
      transition: background-color 0.18s linear;
    }

    #qrCanvas {
      width: 88%;
      height: 88%;
      display: block;
      background: #fff;
      image-rendering: pixelated;
      border: 1px solid #00000020;
    }

    .tap {
      margin: clamp(10px, 1.8dvh, 18px) 0 clamp(10px, 1.8dvh, 16px);
      font-size: clamp(24px, 4.6vw, 48px);
      font-weight: 600;
      line-height: 1.05;
    }

    .dash {
      width: 84%;
      border-bottom: 5px dashed #b7bcc6;
      margin-bottom: clamp(22px, 3.6dvh, 44px);
    }

    .type {
      margin: 0;
      font-size: clamp(52px, 9.8vw, 88px);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
    }

    .type.interstate {
      color: #ea2948;
    }

    .zone {
      margin: clamp(8px, 1.4dvh, 14px) 0 0;
      font-size: clamp(98px, 17vw, 150px);
      line-height: 0.92;
      font-weight: 900;
    }

    .zone-ride {
      margin: clamp(10px, 1.8dvh, 20px) 0 0;
      font-size: clamp(52px, 8.6vw, 84px);
      font-weight: 900;
      line-height: 1;
    }

    .riders {
      margin: clamp(8px, 1.2dvh, 14px) 0 0;
      font-size: clamp(22px, 4.8vw, 44px);
      line-height: 1.05;
    }

    .stretch {
      flex: 1;
      min-height: clamp(24px, 8dvh, 150px);
    }

    .stripe {
      width: 88%;
      height: clamp(14px, 1.8dvh, 22px);
      background: linear-gradient(90deg, #c5ebe0 0 33.333%, #7d0a45 33.333% 66.666%, #ece90d 66.666% 100%);
      margin-bottom: clamp(24px, 3.8dvh, 44px);
      animation: stripeBlink 2.6s ease-in-out infinite;
    }

    @keyframes stripeBlink {
      0%,
      100% { opacity: 1; }
      50% { opacity: 0.28; }
    }

    .progress {
      width: 84%;
      height: clamp(10px, 1.4dvh, 14px);
      background: #e2e2e5;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: clamp(20px, 3.2dvh, 40px);
    }

    .progress > div {
      width: 100%;
      height: 100%;
      background: #1e84eb;
      border-radius: inherit;
      transform-origin: left center;
      transform: scaleX(0);
    }

    .timer {
      margin: 0;
      font-size: clamp(22px, 5vw, 46px);
      line-height: 1.02;
    }

    .timer strong {
      font-size: clamp(72px, 11.2vw, 104px);
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .hint {
      margin: clamp(8px, 1.8dvh, 18px) 0 0;
      font-size: clamp(20px, 4.6vw, 42px);
      line-height: 1.08;
      color: #1a1a1a;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="header">
      <h1 class="title">One Way Ticket</h1>
    </header>

    <section class="ticket-card" aria-label="Ticket">
      <div class="qr-shell" id="qrShell">
        <canvas id="qrCanvas" width="420" height="420" aria-label="QR code"></canvas>
      </div>

      <p class="tap">Tap to enlarge</p>
      <div class="dash"></div>

      <h2 id="typeText" class="type">INTRASTATE</h2>
      <p id="zoneText" class="zone">2</p>
      <p class="zone-ride">ZONE RIDE</p>
      <p id="ridersText" class="riders">1 Adult</p>
      <div class="stretch"></div>

      <div class="stripe"></div>
      <div class="progress"><div id="progressBar"></div></div>
      <p class="timer">Expires in <strong id="timerText">30:00</strong></p>
      <p class="hint">View Onboard Validator Instructions</p>
    </section>
  </main>

  <script>
    const qrCanvas = document.getElementById("qrCanvas");
    const qrShell = document.getElementById("qrShell");
    const ctx = qrCanvas.getContext("2d");
    const typeText = document.getElementById("typeText");
    const zoneText = document.getElementById("zoneText");
    const ridersText = document.getElementById("ridersText");
    const timerText = document.getElementById("timerText");
    const progressBar = document.getElementById("progressBar");

    const borderColors = ["var(--qr-purple)", "var(--qr-blue)"];
    let borderIndex = -1;
    let tripType = "intrastate";
    let zone = 2;
    let adults = 1;
    let totalSeconds = 30 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let qrIssueCounter = 0;

    function randomUint32() {
      if (window.crypto && window.crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0];
      }
      return Math.floor(Math.random() * 4294967295);
    }

    function nextSeed() {
      qrIssueCounter += 1;
      return (Date.now() ^ randomUint32() ^ qrIssueCounter) >>> 0;
    }

    function rand(state) {
      const next = (state * 1664525 + 1013904223) >>> 0;
      return [next, next / 4294967296];
    }

    function drawFinder(x, y, matrix, unit, offset) {
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + x * unit, offset + y * unit, 7 * unit, 7 * unit);
      ctx.fillStyle = "#fff";
      ctx.fillRect(offset + (x + 1) * unit, offset + (y + 1) * unit, 5 * unit, 5 * unit);
      ctx.fillStyle = "#000";
      ctx.fillRect(offset + (x + 2) * unit, offset + (y + 2) * unit, 3 * unit, 3 * unit);
      for (let r = 0; r < 7; r += 1) {
        for (let c = 0; c < 7; c += 1) {
          matrix[y + r][x + c] = 2;
        }
      }
    }

    function drawQr(seed) {
      const size = 57;
      const unit = Math.floor(qrCanvas.width / size);
      const offset = Math.floor((qrCanvas.width - size * unit) / 2);
      const matrix = Array.from({ length: size }, () => Array(size).fill(0));

      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, qrCanvas.width, qrCanvas.height);

      drawFinder(2, 2, matrix, unit, offset);
      drawFinder(size - 9, 2, matrix, unit, offset);
      drawFinder(2, size - 9, matrix, unit, offset);

      let state = seed;
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (matrix[r][c] === 2) {
            continue;
          }
          const output = rand(state);
          state = output[0];
          if (output[1] > 0.5) {
            ctx.fillStyle = "#000";
            ctx.fillRect(offset + c * unit, offset + r * unit, unit, unit);
          }
        }
      }
    }

    function formatTimer(seconds) {
      const mins = Math.floor(seconds / 60).toString();
      const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function renderText() {
      typeText.textContent = tripType.toUpperCase();
      typeText.classList.toggle("interstate", tripType === "interstate");
      zoneText.textContent = zone.toString();
      ridersText.textContent = `${adults} ${adults === 1 ? "Adult" : "Adults"}`;
    }

    function tick() {
      if (remainingSeconds <= 0) {
        clearInterval(timerId);
        timerId = null;
        timerText.textContent = "0:00";
        progressBar.style.transform = "scaleX(1)";
        return;
      }
      remainingSeconds -= 1;
      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = `scaleX(${(totalSeconds - remainingSeconds) / totalSeconds})`;
    }

    function issueTicket() {
      borderIndex = (borderIndex + 1) % borderColors.length;
      qrShell.style.background = borderColors[borderIndex];
      drawQr(nextSeed());
      renderText();

      totalSeconds = tripType === "interstate" ? 60 * 60 : 30 * 60;
      remainingSeconds = totalSeconds;
      timerText.textContent = formatTimer(remainingSeconds);
      progressBar.style.transform = "scaleX(0)";

      if (timerId) {
        clearInterval(timerId);
      }
      timerId = setInterval(tick, 1000);
    }

    zoneText.addEventListener("click", () => {
      zone = zone === 20 ? 1 : zone + 1;
      issueTicket();
    });

    ridersText.addEventListener("click", () => {
      adults = adults === 10 ? 1 : adults + 1;
      issueTicket();
    });

    typeText.addEventListener("click", () => {
      tripType = tripType === "intrastate" ? "interstate" : "intrastate";
      issueTicket();
    });

    qrShell.addEventListener("click", issueTicket);
    issueTicket();
  </script>
</body>
</html>
